<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="300" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="glow" x1="600" y1="0" x2="600" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)"/>
  <rect width="1200" height="400" fill="url(#glow)"/>

  <!-- Grid pattern -->
  <g stroke="#334155" stroke-width="0.5" opacity="0.3">
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="800" y1="0" x2="800" y2="400"/>
    <line x1="1000" y1="0" x2="1000" y2="400"/>
  </g>

  <!-- Decorative dots -->
  <g fill="#3b82f6" opacity="0.2">
    <circle cx="150" cy="100" r="60"/>
    <circle cx="1050" cy="300" r="80"/>
    <circle cx="900" cy="80" r="40"/>
    <circle cx="300" cy="320" r="50"/>
  </g>

  <!-- Logo shield -->
  <g transform="translate(440, 60)">
    <rect x="0" y="0" width="56" height="56" rx="14" fill="url(#accent)"/>
    <text x="28" y="38" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="800" fill="white">S</text>
  </g>

  <!-- Title -->
  <text x="510" y="100" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="40" font-weight="800" fill="white" letter-spacing="-0.5">Sovereign AEO Tracker</text>

  <!-- Subtitle -->
  <text x="600" y="145" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="18" fill="#94a3b8">Open-source AI visibility intelligence dashboard</text>

  <!-- Feature pills -->
  <g transform="translate(600, 180)" text-anchor="middle">
    <!-- Row 1 -->
    <g transform="translate(-280, 0)">
      <rect x="-70" y="-14" width="140" height="28" rx="14" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
      <text y="5" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#60a5fa" text-anchor="middle">🤖 6 AI Models</text>
    </g>
    <g transform="translate(-100, 0)">
      <rect x="-80" y="-14" width="160" height="28" rx="14" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
      <text y="5" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#60a5fa" text-anchor="middle">📊 Visibility Scoring</text>
    </g>
    <g transform="translate(100, 0)">
      <rect x="-70" y="-14" width="140" height="28" rx="14" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
      <text y="5" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#60a5fa" text-anchor="middle">🔔 Drift Alerts</text>
    </g>
    <g transform="translate(280, 0)">
      <rect x="-80" y="-14" width="160" height="28" rx="14" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
      <text y="5" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#60a5fa" text-anchor="middle">🔗 Citation Analysis</text>
    </g>

    <!-- Row 2 -->
    <g transform="translate(-210, 40)">
      <rect x="-85" y="-14" width="170" height="28" rx="14" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
      <text y="5" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#60a5fa" text-anchor="middle">⚔️ Competitor Intel</text>
    </g>
    <g transform="translate(0, 40)">
      <rect x="-70" y="-14" width="140" height="28" rx="14" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
      <text y="5" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#60a5fa" text-anchor="middle">🛡️ BYOK / Local</text>
    </g>
    <g transform="translate(210, 40)">
      <rect x="-80" y="-14" width="160" height="28" rx="14" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
      <text y="5" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#60a5fa" text-anchor="middle">🔍 AEO Site Audit</text>
    </g>
  </g>

  <!-- Model logos row -->
  <g transform="translate(600, 300)" text-anchor="middle">
    <text y="-20" font-family="system-ui, sans-serif" font-size="11" font-weight="500" fill="#64748b" text-anchor="middle" letter-spacing="2">TRACKS ACROSS</text>
    <g transform="translate(-300, 0)">
      <rect x="-48" y="-12" width="96" height="24" rx="6" fill="#1a1a2e"/>
      <text y="4" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#e2e8f0">ChatGPT</text>
    </g>
    <g transform="translate(-180, 0)">
      <rect x="-48" y="-12" width="96" height="24" rx="6" fill="#1a1a2e"/>
      <text y="4" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#e2e8f0">Perplexity</text>
    </g>
    <g transform="translate(-60, 0)">
      <rect x="-48" y="-12" width="96" height="24" rx="6" fill="#1a1a2e"/>
      <text y="4" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#e2e8f0">Gemini</text>
    </g>
    <g transform="translate(60, 0)">
      <rect x="-48" y="-12" width="96" height="24" rx="6" fill="#1a1a2e"/>
      <text y="4" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#e2e8f0">Copilot</text>
    </g>
    <g transform="translate(180, 0)">
      <rect x="-48" y="-12" width="96" height="24" rx="6" fill="#1a1a2e"/>
      <text y="4" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#e2e8f0">Google AI</text>
    </g>
    <g transform="translate(300, 0)">
      <rect x="-48" y="-12" width="96" height="24" rx="6" fill="#1a1a2e"/>
      <text y="4" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#e2e8f0">Grok</text>
    </g>
  </g>

  <!-- Bottom bar -->
  <rect y="370" width="1200" height="30" fill="#0c1222"/>
  <text x="600" y="390" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#475569">Next.js 16 · Bright Data · OpenRouter · Tailwind CSS v4 · TypeScript · Recharts · 100% Local-First</text>

  <!-- Border glow -->
  <rect x="0" y="0" width="1200" height="2" fill="url(#accent)"/>
  <rect x="0" y="398" width="1200" height="2" fill="url(#accent)" opacity="0.5"/>
</svg>
