# ==========================================================
# 운영(prod) 서버 배포용 docker-compose.yml
# 경로: /datadrive/apps/geo-tracker/docker-compose.yml
# 컨테이너명: mbd-geo-tracker
# 포트: 외부 노출 없음 (nginx_proxy 가 내부 네트워크로 접근)
# 이미지 저장소: GHCR
# 네트워크: nginxproxy_default (NPM nginx_proxy 와 동일)
# ==========================================================
version: "3.9"

services:
  mbd-geo-tracker:
    image: ghcr.io/magicbodypilates/magicbody-geo-tracker:latest
    container_name: mbd-geo-tracker
    restart: unless-stopped
    # 운영은 포트를 외부에 노출하지 않음 — NPM 이 컨테이너명으로 직접 라우팅
    env_file:
      - /datadrive/apps/geo-tracker/.env
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      # Phase 5A — DB 접속. POSTGRES_PASSWORD 는 .env 에서 주입
      - POSTGRES_URL=postgres://geotracker:${POSTGRES_PASSWORD}@mbd-geo-tracker-db:5432/geotracker
    depends_on:
      mbd-geo-tracker-db:
        condition: service_healthy
    volumes:
      # GSC OAuth 토큰 파일 등 재배포 후에도 유지돼야 하는 상태 저장용
      - /datadrive/apps/geo-tracker/data:/app/data
    networks:
      - nginxproxy_default

  # Phase 5A — PostgreSQL
  # 데이터 볼륨은 호스트 /datadrive/apps/geo-tracker/pgdata 에 영속
  mbd-geo-tracker-db:
    image: postgres:16-alpine
    container_name: mbd-geo-tracker-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=geotracker
      - POSTGRES_USER=geotracker
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - /datadrive/apps/geo-tracker/pgdata:/var/lib/postgresql/data
    # 포트는 외부에 노출 안 함 — 같은 docker network 의 app 컨테이너만 접근
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U geotracker -d geotracker"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - nginxproxy_default

networks:
  nginxproxy_default:
    external: true
