name: Run DB migration (manual)

# 수동 트리거 전용 — drizzle/migrations/ 신규 파일 추가 시 실행.
# 실행 대상은 이미 배포된 운영 Azure VM 의 postgres 컨테이너.
# 컨테이너 내에서 `node scripts/migrate.mjs` 호출 → __drizzle_migrations 테이블 기준으로 미적용만 실행.

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: '운영 DB 마이그레이션 실행. "yes" 입력 필수.'
        required: true
        default: 'no'

jobs:
  migrate:
    if: ${{ inputs.confirm == 'yes' }}
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - name: SSH to Azure VM and run migration
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.AZURE_PROD_HOST }}
          port: ${{ secrets.AZURE_PROD_PORT }}
          username: ${{ secrets.AZURE_PROD_USER }}
          key: ${{ secrets.AZURE_PROD_SSH_KEY }}
          timeout: 30s
          command_timeout: 5m
          script: |
            set -e
            cd /datadrive/apps/geo-tracker
            # 실행 중인 앱 컨테이너 안에서 마이그레이션 수행 (POSTGRES_URL 환경변수 이미 주입됨)
            docker compose exec -T mbd-geo-tracker node scripts/migrate.mjs
            echo "Migration complete."
